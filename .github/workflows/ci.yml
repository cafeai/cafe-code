name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.1

      - name: Activate pinned Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.17.1 --activate
          corepack yarn --version

      - name: Cache Yarn and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.yarn/berry
            .turbo
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('yarn.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('yarn.lock') }}-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Audit repository toolchain
        if: runner.os == 'Linux'
        run: corepack yarn audit:repository

      - name: Format
        if: runner.os == 'Linux'
        run: corepack yarn fmt:check

      - name: Lint
        if: runner.os == 'Linux'
        run: corepack yarn lint

      - name: Typecheck
        run: corepack yarn typecheck

      - name: Test
        run: corepack yarn test

      - name: Build desktop pipeline
        run: corepack yarn build:desktop

      - name: Install browser test runtime
        if: runner.os == 'Linux'
        run: corepack yarn workspace @cafecode/web exec playwright install --with-deps chromium

      - name: Browser tests
        if: runner.os == 'Linux'
        run: corepack yarn workspace @cafecode/web test:browser

  native-artifacts:
    name: Native artifact (${{ matrix.name }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-2025
            command: dist:desktop:win:x64
          - name: macos-arm64
            os: macos-15
            command: dist:desktop:dmg:arm64
          - name: macos-x64
            os: macos-15-intel
            command: dist:desktop:dmg:x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.1

      - name: Activate pinned Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.17.1 --activate

      - name: Cache Yarn and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.yarn/berry
            .turbo
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('yarn.lock') }}-${{ hashFiles('turbo.json') }}

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Build native artifact
        run: corepack yarn ${{ matrix.command }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v6
        with:
          name: cafe-code-${{ matrix.name }}
          path: release/
          if-no-files-found: error

  linux-artifact:
    name: Linux AppImage
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.1

      - name: Activate pinned Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.17.1 --activate

      - name: Cache Yarn and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.yarn/berry
            .turbo
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('yarn.lock') }}-${{ hashFiles('turbo.json') }}

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Build AppImage
        run: corepack yarn dist:desktop:linux

      - name: Upload AppImage
        uses: actions/upload-artifact@v6
        with:
          name: cafe-code-linux-x64
          path: release/
          if-no-files-found: error
